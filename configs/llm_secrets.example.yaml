# Copy this file to configs/llm_secrets.yaml for local experiments.
# configs/llm_secrets.yaml is ignored by git. Do not commit real API keys.
#
# Prefer api_key_env whenever possible:
#   export OPENAI_API_KEY=...
#   python run_benchmark.py --config configs/llm_secrets.yaml

experiment:
  budget: 8
  seeds: [0]
  methods:
    - wmbo
  initial_samples: 4
  candidate_pool_size: 512
  output_dir: results/llm_secret_debug

benchmark_suite:
  benchmarks:
    - branin

llm:
  enabled: true
  provider: openai_compatible
  model: gpt-4o-mini
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  # api_key: replace-with-a-local-key-only-in-configs/llm_secrets.yaml
  temperature: 0.0
  fallback_to_rule: true
  log_io: false
  timeout: 120
  max_retries: 3
  retry_delay_seconds: 2
  request_delay_seconds: 0

# Provider examples for OpenAI-compatible services:
#
# OpenAI:
#   base_url: https://api.openai.com/v1
#   model: gpt-4o-mini
#   api_key_env: OPENAI_API_KEY
#
# SiliconFlow:
#   base_url: https://api.siliconflow.cn/v1
#   model: Qwen/Qwen2.5-72B-Instruct
#   api_key_env: SILICONFLOW_API_KEY
#
# OpenRouter:
