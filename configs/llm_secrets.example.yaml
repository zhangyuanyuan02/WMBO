# Copy this file to configs/llm_secrets.yaml for local experiments.
# configs/llm_secrets.yaml is ignored by git. Do not commit real API keys.

active_provider: siliconflow

providers:
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    timeout: 120
    max_retries: 3

  siliconflow:
    api_key: replace-with-your-siliconflow-api-key
    base_url: https://api.siliconflow.cn/v1
    model: deepseek-ai/DeepSeek-V3.2
    timeout: 180
    max_retries: 10
    retry_delay_seconds: 5
    request_delay_seconds: 1

  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    model: openai/gpt-4o-mini
    timeout: 120
    max_retries: 3

  groq:
    api_key_env: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    timeout: 120
    max_retries: 3
